<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --danger: #ff4757;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* --- VENTANA FIJA DE NOTIFICACIÓN (Ajustada al diseño) --- */
        #notif-fija-container {
            width: 100%;
            padding: 10px 5%;
            position: sticky;
            top: 70px;
            z-index: 90;
        }
        .notif-box {
            padding: 1.2rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .notif-mama { background: rgba(255, 71, 87, 0.9); color: white; }
        .notif-alumno { background: rgba(99, 102, 241, 0.9); color: white; }
        .btn-notif { background: white; color: black; border: none; padding: 7px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.7rem; }

        /* --- LOGIN SECTION --- */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card-bg); backdrop-filter: blur(20px); padding: 3rem; border-radius: 2rem; width: 100%; max-width: 450px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; }
        .login-card h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin: 2rem 0; }
        input { width: 100%; padding: 1.2rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; color: white; font-size: 1rem; }
        .btn-primary { width: 100%; padding: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* --- HEADER --- */
        header { padding: 1.5rem 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        .badge { background: var(--primary); padding: 0.5rem 1.2rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 800; }

        /* --- GRID CURSOS --- */
        .container { max-width: 1300px; margin: 3rem auto; padding: 0 20px; }
        .section-title { font-size: 2rem; font-weight: 800; margin-bottom: 2rem; border-left: 5px solid var(--primary); padding-left: 1rem; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        .curso-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 2.5rem 1.5rem; border-radius: 1.5rem; text-align: center; transition: 0.4s; cursor: pointer; position: relative; overflow: hidden; }
        .curso-card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.05); border-color: var(--primary); }
        .curso-card h3 { font-weight: 700; font-size: 1.1rem; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 1000px; height: 85vh; border-radius: 2.5rem; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 2rem; overflow-y: auto; flex-grow: 1; }
        .week-item { background: rgba(255,255,255,0.02); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.2rem; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .week-item.locked { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .file-link { padding: 0.8rem 1.5rem; border-radius: 0.8rem; text-decoration: none; font-size: 0.85rem; font-weight: 700; background: rgba(255,255,255,0.05); color: white; transition: 0.3s; }
        .file-link:hover { background: var(--primary); }
        .btn-solucion { border: 1px solid var(--accent); color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1>ACADEMY</h1>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Código de acceso">
            </div>
            <button class="btn-primary" onclick="initApp()">ACCEDER AHORA</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div class="nav-info">
                <div style="font-weight: 800; font-size: 1.4rem;">ACADEMY <span style="color:var(--primary)">.</span></div>
                <div id="role-badge" class="badge">ESTUDIANTE</div>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:700; cursor:pointer;">CERRAR SESIÓN</button>
        </header>

        <div id="notif-fija-container" class="hidden"></div>

        <div class="container">
            <h2 class="section-title">Explorar Cursos</h2>
            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="font-weight: 800;"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            messagingSenderId: "762088181200",
            appId: "1:762088181200:web:f4b871149479649405bdd5",
            measurementId: "G-692NDCWKVK"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA"];
        let ES_MAMA = false;
        let DATA_CONTROL = {};

        // --- LÓGICA DE NOTIFICACIONES ---
        db.ref('notificaciones').on('value', (snap) => {
            const data = snap.val();
            const container = document.getElementById('notif-fija-container');
            if (!data) { container.classList.add('hidden'); return; }

            container.classList.remove('hidden');
            if (ES_MAMA && data.tipo === "SOLICITUD_MAMÁ") {
                container.innerHTML = `<div class="notif-box notif-mama"><span>📢 ACCIÓN REQUERIDA: Activar <b>${data.curso} - Sem ${data.semana}</b></span><button class="btn-notif" onclick="openModal('${data.curso}')">IR AHORA</button></div>`;
            } else if (!ES_MAMA && data.tipo === "NUEVO_CURSO") {
                container.innerHTML = `<div class="notif-box notif-alumno"><span>🚀 ¡NUEVO MATERIAL! Tienes que resolver: <b>${data.curso} - Sem ${data.semana}</b></span><button class="btn-notif" onclick="resolverYLimpiar('${data.curso}')">EMPEZAR</button></div>`;
            } else { container.classList.add('hidden'); }
        });

        async function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('role-badge').innerText = ES_MAMA ? "MODO ADMINISTRADOR" : "MODO ESTUDIANTE";
                if(ES_MAMA) document.getElementById('role-badge').style.background = "#10b981";
                
                db.ref('permisos').on('value', (snap) => {
                    DATA_CONTROL = snap.val() || {};
                    renderCursos();
                });
            } else { alert("Código inválido"); }
        }

        function renderCursos() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = CURSOS.map(c => `<div class="curso-card" onclick="openModal('${c}')"><h3>${c}</h3><p style="font-size:0.7rem; color:var(--text-dim); margin-top:10px;">SEMANAS DISPONIBLES</p></div>`).join('');
        }

        function openModal(nombreCurso) {
            document.getElementById('modal-title').innerText = nombreCurso;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(nombreCurso);
        }

        function renderSemanas(nombreCurso) {
            const body = document.getElementById('modal-body');
            let html = "";
            for(let i=1; i<=40; i++) {
                let idSem = `${nombreCurso}_S${i}`;
                let desbloqueada = DATA_CONTROL[idSem] || false;
                html += `
                    <div class="week-item ${!desbloqueada && !ES_MAMA ? 'locked' : ''}">
                        <div><b>SEMANA ${i}</b> - ${desbloqueada ? 'ABIERTO' : 'BLOQUEADO'}</div>
                        <div style="display:flex; gap:10px;">
                            <a href="#" class="file-link">VER</a>
                            ${ES_MAMA ? `<button onclick="toggleSemana('${nombreCurso}', ${i})" class="file-link btn-solucion">${desbloqueada ? 'BLOQUEAR' : 'DESBLOQUEAR'}</button>` : ''}
                        </div>
                    </div>`;
            }
            body.innerHTML = html;
        }

        function toggleSemana(curso, sem) {
            const id = `${curso}_S${sem}`;
            const nuevoEstado = !DATA_CONTROL[id];
            db.ref('permisos/' + id).set(nuevoEstado);
            if (nuevoEstado) {
                db.ref('notificaciones').set({ tipo: "NUEVO_CURSO", curso: curso, semana: sem });
            } else {
                db.ref('notificaciones').remove();
            }
        }

        function resolverYLimpiar(curso) {
            db.ref('notificaciones').remove();
            openModal(curso);
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
