<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ff4757;
            --accent: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
        }
        .hidden { display: none !important; }

        /* Login */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 3rem; border-radius: 2rem; text-align: center; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 1rem; margin: 1.5rem 0; border-radius: 1rem; border: none; background: rgba(0,0,0,0.3); color: #fff; text-align: center; font-size: 1.2rem; }
        
        /* App */
        header { padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .curso-card { background: var(--card-bg); padding: 2rem 1rem; border-radius: 1.2rem; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .curso-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 900px; height: 85vh; border-radius: 2rem; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; overflow-y: auto; }

        .week-item { background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 0.8rem; display: flex; align-items: center; justify-content: space-between; }
        .week-item.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        
        .action-btns { display: flex; gap: 0.5rem; }
        .file-link { padding: 0.6rem 1rem; border-radius: 0.7rem; text-decoration: none; font-size: 0.75rem; font-weight: 700; background: rgba(255,255,255,0.1); color: white; }
        .btn-control { background: var(--primary); border: none; cursor: pointer; color: white; }
        .btn-solucion { border: 1px solid var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1>ACADEMY</h1>
            <input type="password" id="pass" placeholder="••••••••">
            <button onclick="initApp()" class="btn-control" style="width:100%; padding:1rem; border-radius:1rem; font-weight:800; cursor:pointer;">ENTRAR</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div style="font-weight: 800;">ACADEMY <span id="role-badge" style="font-size: 0.7rem; background: var(--primary); padding: 4px 10px; border-radius: 10px; margin-left: 5px;"></span></div>
            <button onclick="location.reload()" style="color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold;">SALIR</button>
        </header>
        <div class="container">
            <div id="main-grid" class="grid-cursos"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button onclick="closeModal()" style="color:white; background:none; border:none; font-size: 2rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            appId: "1:762088181200:web:f4b871149479649405bdd5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA"];
        const folderIdAlgebra = "17GXptURjIEOLTb9ML5XBTwUa82njbj_3";

        let ES_MAMA = false;
        let DATA_CONTROL = {};

        db.ref('permisos').on('value', snap => {
            DATA_CONTROL = snap.val() || {};
            const activeModal = document.getElementById('modal-title').innerText;
            if(activeModal) renderSemanas(activeModal);
        });

        function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('role-badge').innerText = ES_MAMA ? "ADMIN" : "ALUMNO";
                renderCursos();
            } else { alert("Código incorrecto"); }
        }

        function renderCursos() {
            document.getElementById('main-grid').innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')"><h3>${c}</h3></div>
            `).join('');
        }

        function openModal(c) {
            document.getElementById('modal-title').innerText = c;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(c);
        }

        function renderSemanas(curso) {
            const body = document.getElementById('modal-body');
            let html = "";

            for(let i=1; i<=40; i++) {
                let n = i < 10 ? "0" + i : i;
                let id = `${curso}_S${i}`;
                let desbloqueada = DATA_CONTROL[id] || false;
                let linkT, linkP, linkR;

                if (curso === "ALGEBRA") {
                    linkT = `https://drive.google.com/drive/search?q=parent:${folderIdAlgebra} "SEM ${n} - TEORIA"`;
                    linkP = `https://drive.google.com/drive/search?q=parent:${folderIdAlgebra} "SEM ${n} - PRACTICA"`;
                    linkR = `https://drive.google.com/drive/search?q=parent:${folderIdAlgebra} "SEM ${n} - RESOLUCION"`;
                } else {
                    linkT = `https://drive.google.com/drive/search?q="${curso}" "Semana ${n}" "Teoria"`;
                    linkP = `https://drive.google.com/drive/search?q="${curso}" "Semana ${n}" "Practica"`;
                    linkR = `https://drive.google.com/drive/search?q="${curso}" "Semana ${n}" "RES"`;
                }

                html += `
                <div class="week-item ${!desbloqueada && !ES_MAMA ? 'locked' : ''}">
                    <div style="font-weight:bold;">SEMANA ${n}</div>
                    <div class="action-btns">
                        <a href="${linkT}" target="_blank" class="file-link">TEORÍA</a>
                        <a href="${linkP}" target="_blank" class="file-link">PRÁCTICA</a>
                        ${ES_MAMA ? `
                            <a href="${linkR}" target="_blank" class="file-link btn-solucion">RES</a>
                            <button onclick="toggle('${id}')" class="file-link btn-control">${desbloqueada ? 'LOCK' : 'OPEN'}</button>
                        ` : ''}
                    </div>
                </div>`;
            }
            body.innerHTML = html;
        }

        function toggle(id) {
            const current = DATA_CONTROL[id] || false;
            db.ref('permisos/' + id).set(!current);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal-title').innerText = "";
        }
    </script>
</body>
</html>
