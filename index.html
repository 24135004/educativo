<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #10b981;
            --danger: #ef4444;
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- LOGIN MODERNIZADO --- */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            padding: 3rem 2rem;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .login-card h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(to bottom right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        input {
            width: 100%; padding: 1.2rem; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 1.2rem;
            color: white; margin: 2rem 0; font-size: 1rem; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.05); box-shadow: 0 0 20px var(--primary-glow); }

        .btn-primary {
            width: 100%; padding: 1.2rem; background: var(--primary);
            color: white; border: none; border-radius: 1.2rem;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px var(--primary-glow); }

        /* --- DASHBOARD --- */
        header {
            padding: 1.2rem 5%; background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(15px); display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }

        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }

        .curso-card {
            background: var(--card-bg); padding: 2.5rem 1.5rem; border-radius: 2rem;
            border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: center; cursor: pointer;
        }
        .curso-card:hover { transform: translateY(-8px) scale(1.02); border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        /* --- MODAL (SISTEMA MODERNO) --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content {
            background: #0f172a; width: 95%; max-width: 900px; height: 85vh;
            border-radius: 3rem; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { padding: 2rem; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .modal-body { padding: 2rem; overflow-y: auto; flex-grow: 1; }

        /* --- SEMANAS --- */
        .week-item {
            background: rgba(255,255,255,0.03); border-radius: 1.5rem; padding: 1.5rem;
            margin-bottom: 1rem; border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 1rem; transition: 0.3s;
        }
        @media (min-width: 768px) { .week-item { flex-direction: row; justify-content: space-between; align-items: center; } }

        .week-item.locked { opacity: 0.2; filter: blur(2px); pointer-events: none; }
        
        .action-btns { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        
        .file-link {
            padding: 0.8rem 1.2rem; border-radius: 1rem; text-decoration: none;
            font-size: 0.75rem; font-weight: 700; background: rgba(255,255,255,0.06);
            color: #fff; border: 1px solid var(--border); transition: 0.2s;
            text-align: center; min-width: 100px;
        }
        .file-link:hover { background: var(--primary); border-color: var(--primary); }
        .btn-control { background: #fff !important; color: #000 !important; border: none; }
        .btn-solucion { border-color: var(--accent); color: var(--accent); }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 600px) {
            .grid-cursos { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
            .curso-card { padding: 1.5rem 0.5rem; border-radius: 1.5rem; }
            .curso-card h3 { font-size: 0.85rem; }
            .modal-content { height: 92vh; border-radius: 2rem 2rem 0 0; align-self: flex-end; }
            .action-btns .file-link { flex: 1; }
            header { padding: 1rem 1.5rem; }
        }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1>ACADEMY</h1>
            <p style="color:var(--text-dim); margin-bottom: 1rem;">Ingresa tus credenciales</p>
            <input type="password" id="pass" placeholder="••••••••">
            <button class="btn-primary" onclick="initApp()">Entrar al Sistema</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div style="font-weight: 800; font-size: 1.3rem;">ACADEMY <span id="role-badge" style="font-size:0.6rem; background:var(--primary); padding:4px 10px; border-radius:50px; margin-left:8px;"></span></div>
            <button onclick="location.reload()" style="background:rgba(239, 68, 68, 0.1); border:none; color:var(--danger); font-weight:700; padding: 8px 15px; border-radius: 12px;">SALIR</button>
        </header>

        <div class="container">
            <div id="mensaje-mama" class="hidden" style="background: linear-gradient(90deg, rgba(16,185,129,0.1), transparent); border-left: 4px solid var(--accent); padding: 1.5rem; border-radius: 1rem; margin-bottom: 2rem;">
                <h4 style="color:var(--accent)">Panel de Administración</h4>
                <p style="font-size:0.8rem; color:var(--text-dim)">Gestiona el acceso en tiempo real.</p>
            </div>
            
            <h2 style="margin-bottom:1.5rem; font-weight: 800; font-size: 1.8rem;">Cursos Disponibles</h2>
            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            appId: "1:762088181200:web:f4b871149479649405bdd5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // IDs DE ÁLGEBRA INTEGRADOS (Las 5 semanas)
        const ARCHIVOS_IDS = {
          "SEM 01 - TEORIA.pdf": "14xYuvtSJJZsmQsaxNLdrYZOi1Gk46Gr8",
          "SEM 01 - PRACTICA.pdf": "15Kf80S3WCPDjFKeYX_k5XrVJJmO9ygSd",
          "SEM 01 - SOLUCION.pdf": "1vnVn2V9FoWI6WZKYrSAN1OEsUfJYOz1f",
          
          "SEM 02 - TEORIA.pdf": "1wMpqUALhxwARzZVkuyZ1kauovuAdWoyT",
          "SEM 02 - PRACTICA.pdf": "1YJPyzUj3wbTzPP9zxDp65n1ut_fPPjuf",
          "SEM 02 - SOLUCION.pdf": "1Yz1d4jyOKokNWx5_TAnYYXVZ0V7MACik",
          
          "SEM 03 - TEORIA.pdf": "1vXmvdrqy5MPZOsmHg3rHdQvg3c5gRlPd",
          "SEM 03 - PRACTICA.pdf": "1UMl6pIP8vHeGZhCjcEIs5LTr3n9s2P-Z",
          "SEM 03 - SOLUCION.pdf": "1JZNRJ-4TSs8QzpAqjre8yN9NVwwaRf7C",
          
          "SEM 04 - TEORIA.pdf": "1xlCsVefYZsaAPS-A8yw8o6fPh_jg1uQW",
          "SEM 04 - PRACTICA.pdf": "1yMxj2eG7zwtyQduAqn90nqoU9aeOzQUF",
          "SEM 04 - SOLUCION.pdf": "1hi6gfmVFGVZhtJdiafK8LlKuXbsHgVSE",
          
          "SEM 05 - TEORIA.pdf": "1LkvUBYEvhKQmX1pYrCxOsBSg_eneAxY_",
          "SEM 05 - PRACTICA.pdf": "1Esu5TaTobV7eAt97vKYDlERLpEorVqL7",
          "SEM 05 - SOLUCION.pdf": "1_q2XcPo3otcVbV6AklHnyH7oBxTDVf5s"
        };

        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "FISICA", "QUIMICA", "LENGUAJE", "HISTORIA"];
        let ES_MAMA = false;
        let DATA_CONTROL = {};

        db.ref('permisos').on('value', (snap) => {
            DATA_CONTROL = snap.val() || {};
            const title = document.getElementById('modal-title').innerText;
            if(title) renderSemanas(title);
        });

        function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('role-badge').innerText = ES_MAMA ? "ADMIN" : "ALUMNO";
                if(ES_MAMA) document.getElementById('mensaje-mama').classList.remove('hidden');
                renderCursos();
            } else { alert("Código Inválido"); }
        }

        function renderCursos() {
            document.getElementById('main-grid').innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')">
                    <div style="font-size:2rem; margin-bottom:1rem;">${c === 'ALGEBRA' ? '📐' : '📚'}</div>
                    <h3 style="font-weight:700;">${c}</h3>
                </div>
            `).join('');
        }

        function openModal(c) {
            document.getElementById('modal-title').innerText = c;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(c);
        }

        function renderSemanas(curso) {
            const body = document.getElementById('modal-body');
            
            if(curso !== "ALGEBRA") {
                body.innerHTML = `<div style="text-align:center; padding:4rem; color:var(--text-dim);">
                    <p style="font-size:4rem;">🚧</p>
                    <p style="margin-top:1rem;">Contenido de <b>${curso}</b> en mantenimiento.</p>
                </div>`;
                return;
            }

            let html = "";
            for(let i=1; i<=5; i++) { // Renderizamos las 5 semanas que tenemos configuradas
                let n = i < 10 ? "0" + i : i;
                let idControl = `${curso}_S${i}`;
                let unlock = DATA_CONTROL[idControl] || false;

                let linkT = ARCHIVOS_IDS[`SEM ${n} - TEORIA.pdf`] ? `https://drive.google.com/file/d/${ARCHIVOS_IDS[`SEM ${n} - TEORIA.pdf`]}/view` : "#";
                let linkP = ARCHIVOS_IDS[`SEM ${n} - PRACTICA.pdf`] ? `https://drive.google.com/file/d/${ARCHIVOS_IDS[`SEM ${n} - PRACTICA.pdf`]}/view` : "#";
                let linkS = ARCHIVOS_IDS[`SEM ${n} - SOLUCION.pdf`] ? `https://drive.google.com/file/d/${ARCHIVOS_IDS[`SEM ${n} - SOLUCION.pdf`]}/view` : "#";

                html += `
                <div class="week-item ${!unlock && !ES_MAMA ? 'locked' : ''}">
                    <div style="font-weight:800; letter-spacing:1px;">SEMANA ${n} ${unlock ? '⚡' : ''}</div>
                    <div class="action-btns">
                        <a href="${linkT}" target="_blank" class="file-link">TEORÍA</a>
                        <a href="${linkP}" target="_blank" class="file-link">PRÁCTICA</a>
                        ${ES_MAMA ? `
                            <a href="${linkS}" target="_blank" class="file-link btn-solucion">SOLUCIÓN</a>
                            <button onclick="toggle('${idControl}')" class="file-link btn-control">${unlock ? 'BLOQUEAR' : 'DESBLOQUEAR'}</button>
                        ` : ''}
                    </div>
                </div>`;
            }
            body.innerHTML = html;
        }

        function toggle(id) {
            const nuevoEstado = !(DATA_CONTROL[id] || false);
            db.ref('permisos/' + id).set(nuevoEstado);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal-title').innerText = "";
        }
    </script>
</body>
</html>
