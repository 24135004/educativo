<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* TU DISEÑO ORIGINAL PREFERIDO */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --danger: #ff4757;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* HEADER Y BANNER */
        header { padding: 1.5rem 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        .badge { background: var(--primary); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 800; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        
        /* GRID DE CURSOS ORIGINAL */
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        .curso-card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); 
            padding: 2.5rem 1.5rem; border-radius: 1.5rem; text-align: center; 
            transition: 0.4s; cursor: pointer; backdrop-filter: blur(10px);
        }
        .curso-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2); }

        /* MODAL Y TABLA DE SEMANAS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #1e293b; width: 95%; max-width: 1100px; height: 85vh; border-radius: 2.5rem; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .modal-body { padding: 2rem; overflow-y: auto; }

        .week-item {
            background: rgba(255,255,255,0.03); border-radius: 1.2rem; padding: 1.2rem; margin-bottom: 1rem;
            display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05);
        }

        .resource-group { display: flex; gap: 1rem; }
        
        /* BOTONES DE ARCHIVO */
        .btn-file { 
            padding: 0.8rem 1.2rem; border-radius: 0.8rem; text-decoration: none; font-size: 0.8rem; font-weight: 700;
            background: rgba(255,255,255,0.05); color: white; display: flex; flex-direction: column; align-items: center; gap: 4px;
            min-width: 110px; transition: 0.3s;
        }
        .btn-file:hover:not(.locked) { background: var(--primary); }
        .btn-file.locked { opacity: 0.15; pointer-events: none; filter: grayscale(1); border: 1px dashed #555; }
        
        /* BOTONES DE CONTROL MAMÁ */
        .admin-controls { margin-top: 5px; display: flex; flex-direction: column; align-items: center; }
        .btn-toggle { font-size: 0.6rem; padding: 3px 8px; border-radius: 5px; border: none; cursor: pointer; font-weight: 800; text-transform: uppercase; }
        .on { background: var(--accent); color: white; }
        .off { background: var(--danger); color: white; }

        /* LOGIN */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .login-card { background: var(--card-bg); padding: 3rem; border-radius: 2.5rem; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1 style="margin-bottom: 1.5rem; font-weight: 800; letter-spacing: -1px;">ACADEMY</h1>
            <input type="password" id="pass" placeholder="Código de acceso" style="width: 100%; padding: 1.2rem; border-radius: 1rem; border: none; background: rgba(0,0,0,0.3); color: white; margin-bottom: 1rem;">
            <button onclick="initApp()" style="width: 100%; padding: 1.2rem; border-radius: 1rem; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer;">ENTRAR AL SISTEMA</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div>
                <span style="font-weight:800; font-size:1.3rem;">SISTEMA <span style="color:var(--primary)">ACADÉMICO</span></span>
                <span id="role-badge" class="badge" style="margin-left: 10px;">ESTUDIANTE</span>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:700;">SALIR</button>
        </header>

        <div class="container">
            <div id="panel-admin-info" class="hidden" style="background: rgba(16, 185, 129, 0.1); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid var(--accent); margin-bottom: 2rem; color: var(--accent);">
                ✨ <b>Modo Administrador:</b> Activa o desactiva cada recurso haciendo clic en los botones ON/OFF dentro de cada curso.
            </div>
            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2.5rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            messagingSenderId: "762088181200",
            appId: "1:762088181200:web:f4b871149479649405bdd5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA"];
        
        let ES_MAMA = false;
        let PERMISOS = {};

        // SINCRONIZACIÓN EN TIEMPO REAL
        db.ref('permisos').on('value', (snapshot) => {
            PERMISOS = snapshot.val() || {};
            const cursoAbierto = document.getElementById('modal-title').innerText;
            if(cursoAbierto) renderSemanas(cursoAbierto);
        });

        function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                if(ES_MAMA) {
                    document.getElementById('role-badge').innerText = "ADMINISTRADOR";
                    // ¡AQUÍ ESTABA EL ERROR! Faltaban las comillas. Ya está corregido a #10b981
                    document.getElementById('role-badge').style.background = "#10b981";
                    document.getElementById('panel-admin-info').classList.remove('hidden');
                }
                renderCursos();
            } else { alert("Clave Incorrecta"); }
        }

        function renderCursos() {
            document.getElementById('main-grid').innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')">
                    <h3 style="letter-spacing:1px;">${c}</h3>
                </div>`).join('');
        }

        function openModal(c) {
            document.getElementById('modal-title').innerText = c;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(c);
        }

        function renderSemanas(curso) {
            const container = document.getElementById('modal-body');
            let html = "";

            for(let i=1; i<=40; i++) {
                const s = i < 10 ? `0${i}` : i;
                const sTriple = i < 10 ? `00${i}` : `0${i}`;
                
                // IDs únicos para cada botón
                const idT = `${curso}_S${i}_TEORIA`;
                const idP = `${curso}_S${i}_PRACTICA`;
                const idS = `${curso}_S${i}_SOLUCION`;

                // Verificar si están permitidos
                const okT = PERMISOS[idT] || false;
                const okP = PERMISOS[idP] || false;
                const okS = PERMISOS[idS] || false;

                // CORRECCIÓN DE RUTAS SEGÚN TU DRIVE/GITHUB
                // La estructura detectada es: CURSO 2024 1-40 / [CARPETA] / Archivo
                const base = `https://github.com/24135004/educativo/raw/main/${encodeURIComponent(curso + " 2024 1-40")}`;
                
                // Lógica de nombres de archivo (Ejemplo: ASM-TS001-AL.pdf)
                const sigla = curso.substring(0, 2).toUpperCase();

                html += `
                <div class="week-item">
                    <div style="font-weight:800; color:var(--text-dim)">SEMANA ${s}</div>
                    <div class="resource-group">
                        <div class="admin-controls">
                            <a href="${base}/DIAPOSITIVAS/ASM-TS${sTriple}-${sigla}.pdf" target="_blank" class="btn-file ${!okT && !ES_MAMA ? 'locked' : ''}">TEORÍA</a>
                            ${ES_MAMA ? `<button onclick="togglePermiso('${idT}')" class="btn-toggle ${okT ? 'on' : 'off'}">${okT ? 'ON' : 'OFF'}</button>` : ''}
                        </div>
                        <div class="admin-controls">
                            <a href="${base}/DIRIGIDAS/${sigla}_ASM_Dir_Sem${s}.pdf" target="_blank" class="btn-file ${!okP && !ES_MAMA ? 'locked' : ''}">PRÁCTICA</a>
                            ${ES_MAMA ? `<button onclick="togglePermiso('${idP}')" class="btn-toggle ${okP ? 'on' : 'off'}">${okP ? 'ON' : 'OFF'}</button>` : ''}
                        </div>
                        <div class="admin-controls">
                            <a href="${base}/RESOLUCION/RES_Sem${s}.pdf" target="_blank" class="btn-file ${!okS && !ES_MAMA ? 'locked' : ''}" style="color:var(--accent)">SOLUCIÓN</a>
                            ${ES_MAMA ? `<button onclick="togglePermiso('${idS}')" class="btn-toggle ${okS ? 'on' : 'off'}">${okS ? 'ON' : 'OFF'}</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        function togglePermiso(id) {
            const estadoActual = PERMISOS[id] || false;
            db.ref('permisos/' + id).set(!estadoActual);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal-title').innerText = "";
        }
    </script>
</body>
</html>
