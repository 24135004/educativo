<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --danger: #ff4757;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Botón Drive para Mamá */
        .btn-drive-mama {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white; padding: 1rem; border-radius: 1rem;
            text-decoration: none; font-weight: 800; margin-bottom: 2rem;
            transition: 0.3s;
        }

        #mensaje-mama {
            background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent);
            padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; color: var(--accent);
        }

        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 3rem; border-radius: 2rem; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; color: white; margin: 1rem 0; }

        header { padding: 1.5rem 5%; background: rgba(15, 23, 42, 0.8); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .badge { background: var(--primary); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 800; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .curso-card { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }

        /* Estilos del Modal y Filas */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #1e293b; width: 95%; max-width: 1100px; height: 90vh; border-radius: 2rem; display: flex; flex-direction: column; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .modal-body { padding: 1.5rem; overflow-y: auto; }

        .week-item {
            background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem;
            display: grid; grid-template-columns: 150px 1fr; align-items: center; gap: 1rem;
        }

        .resource-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-file { 
            padding: 0.6rem 1rem; border-radius: 0.8rem; text-decoration: none; font-size: 0.8rem; font-weight: 700;
            background: rgba(255,255,255,0.05); color: white; display: flex; flex-direction: column; align-items: center; gap: 5px;
            border: 1px solid transparent;
        }
        
        /* Estados de los botones */
        .btn-file.locked { opacity: 0.3; pointer-events: none; border: 1px dashed #444; }
        .btn-admin-control { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; border: none; cursor: pointer; text-transform: uppercase; }
        .on { background: var(--accent); color: white; }
        .off { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1 style="margin-bottom:1rem;">ACADEMY</h1>
            <input type="password" id="pass" placeholder="Código de acceso">
            <button onclick="initApp()" style="width:100%; padding:1rem; background:var(--primary); color:white; border:none; border-radius:1rem; cursor:pointer; font-weight:700;">ENTRAR</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div class="nav-info">
                <span style="font-weight:800; font-size:1.2rem;">ACADEMY</span>
                <span id="role-badge" class="badge">ESTUDIANTE</span>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:700;">SALIR</button>
        </header>

        <div class="container">
            <a id="btn-drive-admin" href="https://drive.google.com/drive/folders/1gN1BBQbWFflu_bs77iLscJofqOg9UkiS?usp=sharing" target="_blank" class="btn-drive-mama hidden">
                📂 ACCESO A GOOGLE DRIVE PARA IMPRIMIR
            </a>

            <div id="mensaje-mama" class="hidden">
                👩‍🏫 <b>Panel de Control:</b> Puedes activar cada archivo individualmente. El estudiante solo verá lo que tú habilites.
            </div>

            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // Configuración Firebase (Usando tus datos)
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            messagingSenderId: "762088181200",
            appId: "1:762088181200:web:f4b871149479649405bdd5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA", "SIMULACROS", "DOMICILIARIAS", "TEMARIO"];
        
        let ES_MAMA = false;
        let DATA_CONTROL = {};

        // Escuchar cambios en la base de datos
        db.ref('permisos').on('value', (snap) => {
            DATA_CONTROL = snap.val() || {};
            const titulo = document.getElementById('modal-title').innerText;
            if(titulo) renderSemanas(titulo); 
        });

        function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                
                if(ES_MAMA) {
                    document.getElementById('role-badge').innerText = "ADMINISTRADOR";
                    document.getElementById('role-badge').style.background = "#10b981";
                    document.getElementById('mensaje-mama').classList.remove('hidden');
                    document.getElementById('btn-drive-admin').classList.remove('hidden');
                }
                renderCursos();
            } else { alert("Código incorrecto"); }
        }

        function renderCursos() {
            document.getElementById('main-grid').innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')"><h3>${c}</h3></div>
            `).join('');
        }

        function openModal(c) {
            document.getElementById('modal-title').innerText = c;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(c);
        }

        function renderSemanas(curso) {
            const body = document.getElementById('modal-body');
            let html = "";
            for(let i=1; i<=40; i++) {
                const idT = `${curso}_S${i}_TEORIA`;
                const idP = `${curso}_S${i}_PRACTICA`;
                const idS = `${curso}_S${i}_SOLUCION`;

                const okT = DATA_CONTROL[idT] || false;
                const okP = DATA_CONTROL[idP] || false;
                const okS = DATA_CONTROL[idS] || false;

                const base = `https://github.com/24135004/educativo/raw/main/${curso}%202024%201-40`;

                html += `
                <div class="week-item">
                    <div style="font-weight:800; color:var(--text-dim);">SEMANA ${i < 10 ? '0'+i : i}</div>
                    <div class="resource-group">
                        <div style="text-align:center">
                            <a href="${base}/DIAPOSITIVAS/ASM-TS00${i}-AL.pdf" target="_blank" class="btn-file ${!okT && !ES_MAMA ? 'locked' : ''}">TEORÍA</a>
                            ${ES_MAMA ? `<button onclick="toggle('${idT}')" class="btn-admin-control ${okT ? 'on' : 'off'}">${okT ? 'ON' : 'OFF'}</button>` : ''}
                        </div>

                        <div style="text-align:center">
                            <a href="${base}/DIRIGIDAS/AL_ASM_Dir_Sem0${i}.pdf" target="_blank" class="btn-file ${!okP && !ES_MAMA ? 'locked' : ''}">PRÁCTICA</a>
                            ${ES_MAMA ? `<button onclick="toggle('${idP}')" class="btn-admin-control ${okP ? 'on' : 'off'}">${okP ? 'ON' : 'OFF'}</button>` : ''}
                        </div>

                        <div style="text-align:center">
                            <a href="${base}/RESOLUCION/RES_Sem0${i}.pdf" target="_blank" class="btn-file ${!okS && !ES_MAMA ? 'locked' : ''}" style="color:var(--accent); border-color:var(--accent);">SOLUCIONARIO</a>
                            ${ES_MAMA ? `<button onclick="toggle('${idS}')" class="btn-admin-control ${okS ? 'on' : 'off'}">${okS ? 'ON' : 'OFF'}</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }
            body.innerHTML = html;
        }

        function toggle(id) {
            const nuevoEstado = !DATA_CONTROL[id];
            db.ref('permisos/' + id).set(nuevoEstado);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal-title').innerText = "";
        }
    </script>
</body>
</html>
