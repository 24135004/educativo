<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACADEMY INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }
        .hidden { display: none !important; }
        
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 3rem; border-radius: 2rem; text-align: center; width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 1rem; margin: 1rem 0; border-radius: 0.8rem; border: none; background: #000; color: #fff; text-align: center; }
        
        header { padding: 1rem 5%; background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .card { background: var(--card); padding: 2rem; border-radius: 1.5rem; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e293b; width: 95%; max-width: 800px; height: 85vh; border-radius: 2rem; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .modal-body { padding: 1.5rem; overflow-y: auto; }
        .week { background: rgba(255,255,255,0.03); padding: 1rem; margin-bottom: 0.6rem; border-radius: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .week.locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .btns { display: flex; gap: 0.5rem; }
        .link { padding: 0.6rem 1rem; background: var(--primary); color: #fff; text-decoration: none; border-radius: 0.6rem; font-size: 0.75rem; font-weight: 800; }
        .btn-admin { background: #f59e0b; border: none; cursor: pointer; color: white; padding: 0.6rem 1rem; border-radius: 0.6rem; font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1 style="margin-bottom:1rem">ACADEMY</h1>
            <input type="password" id="pass" placeholder="Password">
            <button class="link" style="width:100%; border:none; cursor:pointer; padding:1rem" onclick="login()">ENTRAR</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div style="font-weight: 800;">ACADEMY <span id="badge" style="background:var(--primary); padding:2px 8px; border-radius:5px; font-size:0.6rem; margin-left:10px"></span></div>
            <button onclick="location.reload()" style="background:none; border:none; color:#ff4757; cursor:pointer; font-weight:bold">SALIR</button>
        </header>
        <div class="container"><div id="grid" class="grid"></div></div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div style="padding:1.5rem; display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.1);">
                <h2 id="m-title"></h2>
                <button onclick="closeM()" style="background:none; border:none; color:#fff; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="m-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            appId: "1:762088181200:web:f4b871149479649405bdd5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CURSOS = ["ALGEBRA", "ARITMETICA", "FISICA", "QUIMICA", "BIOLOGIA", "LITERATURA", "HISTORIA"];
        
        // TU LINK DE DRIVE (CARPETA DE ALGEBRA)
        const URL_ALGEBRA = "https://drive.google.com/drive/folders/17GXptURjIEOLTb9ML5XBTwUa82njbj_3";
        
        let ES_MAMA = false;
        let CONTROL = {};

        db.ref('permisos').on('value', s => { 
            CONTROL = s.val() || {}; 
            const active = document.getElementById('m-title').innerText;
            if(active) renderSemanas(active);
        });

        function login() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('badge').innerText = ES_MAMA ? "ADMIN" : "ALUMNO";
                renderCursos();
            } else { alert("Acceso denegado"); }
        }

        function renderCursos() {
            document.getElementById('grid').innerHTML = CURSOS.map(c => `
                <div class="card" onclick="openM('${c}')"><h3>${c}</h3></div>
            `).join('');
        }

        function openM(c) {
            document.getElementById('m-title').innerText = c;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(c);
        }

        function renderSemanas(c) {
            let h = "";
            for(let i=1; i<=40; i++) {
                let n = i < 10 ? "0"+i : i;
                let id = c + "_S" + i;
                let lock = CONTROL[id] || false;
                
                // CAMBIO CLAVE: Ya no busca, abre la carpeta y aplica el filtro de nombre directamente
                let linkT = `${URL_ALGEBRA}?q=${encodeURIComponent(`"SEM ${n} - TEORIA"`)}`;
                let linkP = `${URL_ALGEBRA}?q=${encodeURIComponent(`"SEM ${n} - PRACTICA"`)}`;

                h += `
                <div class="week ${!lock && !ES_MAMA ? 'locked' : ''}">
                    <span style="font-weight:bold">SEMANA ${n}</span>
                    <div class="btns">
                        <a href="${linkT}" target="_blank" class="link">TEORÍA</a>
                        <a href="${linkP}" target="_blank" class="link">PRÁCTICA</a>
                        ${ES_MAMA ? `<button onclick="toggle('${id}')" class="btn-admin">${lock ? 'BLOQUEAR' : 'ACTIVAR'}</button>` : ''}
                    </div>
                </div>`;
            }
            document.getElementById('m-body').innerHTML = h;
        }

        function toggle(id) {
            db.ref('permisos/' + id).set(!(CONTROL[id] || false));
        }

        function closeM() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.getElementById('m-title').innerText = "";
        }
    </script>
</body>
</html>
