<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet Álgebra - San Marcos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --green: #10b981; --bg: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; }
        .hidden { display: none; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 100px auto; max-width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .panel { background: white; padding: 15px; border-radius: 15px; height: 75vh; overflow-y: auto; border: 1px solid #e2e8f0; }
        .panel h3 { position: sticky; top: 0; background: white; margin: 0; padding: 10px 0; border-bottom: 2px solid var(--bg); z-index: 5; font-size: 1.1rem; }
        
        .btn-file {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border: 1px solid #edf2f7; padding: 12px;
            margin: 8px 0; border-radius: 10px; text-decoration: none; color: #4a5568;
            font-size: 0.85rem; transition: 0.2s;
        }
        .btn-file:hover { background: #f8fafc; border-color: var(--blue); transform: scale(1.02); color: var(--blue); }
        .btn-primary { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 600; }
        .logout { color: #ef4444; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .sem-tag { background: #ebf8ff; color: #3182ce; padding: 2px 8px; border-radius: 5px; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="section-login" class="login-box">
        <h2 style="margin-top:0">Acceso Álgebra</h2>
        <input type="password" id="pass" placeholder="Código de acceso">
        <button class="btn-primary" onclick="validar()">Ingresar</button>
    </div>

    <div id="section-panel" class="hidden">
        <div class="header">
            <h3 id="user-title" style="margin:0; color: #2d3748;"></h3>
            <span class="logout" onclick="location.reload()">Cerrar Sesión</span>
        </div>

        <div class="grid">
            <div class="panel">
                <h3>📖 Diapositivas (Teoría)</h3>
                <div id="list-diapo"></div>
            </div>
            <div class="panel">
                <h3>📝 Prácticas (Imprimir)</h3>
                <div id="list-dir"></div>
            </div>
            <div id="panel-mama" class="panel hidden">
                <h3>✅ Resoluciones</h3>
                <div id="list-res"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function validar() {
        const p = document.getElementById('pass').value;
        if(p === "MAMA2026" || p === "ESTUDIANTE01") {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-panel').classList.remove('hidden');
            document.getElementById('user-title').innerText = p === "MAMA2026" ? "Panel Administrador" : "Material de Estudio";
            generarContenido(p === "MAMA2026");
        } else { alert("Código incorrecto"); }
    }

    function generarContenido(esMama) {
        const base = "https://raw.githubusercontent.com/24135004/educativo/main/ALGEBRA%202024%201-40";
        
        for (let i = 1; i <= 40; i++) {
            let n = i < 10 ? "0" + i : i; // Formato 01, 02...
            
            // 1. DIAPOSITIVAS: ASM-TS00[i]-AL.pdf
            document.getElementById('list-diapo').innerHTML += `
                <a href="${base}/DIAPOSITIVAS/ASM-TS00${i}-AL.pdf" target="_blank" class="btn-file">
                    <span><span class="sem-tag">S${n}</span> Diapositiva Teórica</span> <span>→</span>
                </a>`;

            // 2. PRÁCTICAS: AL_ASM_Dir_Sem[n].pdf
            document.getElementById('list-dir').innerHTML += `
                <a href="${base}/DIRIGIDAS/AL_ASM_Dir_Sem${n}.pdf" target="_blank" class="btn-file">
                    <span><span class="sem-tag">S${n}</span> Práctica Dirigida</span> <span>→</span>
                </a>`;

            // 3. RESOLUCIONES (SÓLO MAMÁ)
            if(esMama) {
                document.getElementById('panel-mama').classList.remove('hidden');
                // Para la semana 1 usamos el nombre largo que mandaste, para el resto un estándar
                let resName = (i === 1) ? "2024-03-08%2014-06-36.pdf" : `Res_Sem${n}.pdf`;
                document.getElementById('list-res').innerHTML += `
                    <a href="${base}/RESOLUCIONES/${resName}" target="_blank" class="btn-file">
                        <span><span class="sem-tag">S${n}</span> Solucionario</span> <span>→</span>
                    </a>`;
            }
        }
    }
</script>
</body>
</html>
