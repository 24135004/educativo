<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* Mantenemos tus estilos originales intactos */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --danger: #ff4757;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Estilos de Login y Layout */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 3rem; border-radius: 2rem; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; color: white; margin: 1rem 0; }

        header { padding: 1.5rem 5%; background: rgba(15, 23, 42, 0.8); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .badge { background: var(--primary); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 800; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .curso-card { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .curso-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* Modal y Filas de Semanas */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #1e293b; width: 95%; max-width: 1100px; height: 90vh; border-radius: 2rem; display: flex; flex-direction: column; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .modal-body { padding: 1.5rem; overflow-y: auto; }

        .week-item {
            background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem;
            display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 1rem;
        }

        .resource-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn-file { 
            padding: 0.8rem 1.2rem; border-radius: 0.8rem; text-decoration: none; font-size: 0.8rem; font-weight: 700;
            background: rgba(255,255,255,0.05); color: white; display: flex; flex-direction: column; align-items: center; gap: 5px;
            min-width: 110px; border: 1px solid transparent;
        }
        
        .btn-file.locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .btn-admin-control { font-size: 0.6rem; padding: 4px 8px; border-radius: 5px; border: none; cursor: pointer; margin-top: 5px; font-weight: 800; }
        .on { background: var(--accent); color: white; }
        .off { background: var(--danger); color: white; }

        #mensaje-mama { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; color: var(--accent); }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1>ACADEMY</h1>
            <input type="password" id="pass" placeholder="Código de acceso">
            <button onclick="initApp()" style="width:100%; padding:1rem; background:var(--primary); color:white; border:none; border-radius:1rem; cursor:pointer; font-weight:700;">ENTRAR</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div>
                <span style="font-weight:800; font-size:1.2rem;">ACADEMY</span>
                <span id="role-badge" class="badge">ESTUDIANTE</span>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:700;">SALIR</button>
        </header>

        <div class="container">
            <div id="mensaje-mama" class="hidden">👩‍🏫 <b>Panel de Control:</b> Activa uno por uno los recursos que el estudiante puede ver.</div>
            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            messagingSenderId: "762088181200",
            appId: "1:762088181200:web:f4b871149479649405bdd5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA"];
        
        let ES_MAMA = false;
        let DATA_CONTROL = {};

        // Sincronizar permisos en tiempo real
        db.ref('permisos').on('value', (snap) => {
            DATA_CONTROL = snap.val() || {};
            const activeModal = document.getElementById('modal-title').innerText;
            if(activeModal) renderSemanas(activeModal);
        });

        function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                if(ES_MAMA) {
                    document.getElementById('role-badge').innerText = "ADMINISTRADOR";
                    document.getElementById('mensaje-mama').classList.remove('hidden');
                }
                renderCursos();
            } else { alert("Error"); }
        }

        function renderCursos() {
            document.getElementById('main-grid').innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')"><h3>${c}</h3></div>
            `).join('');
        }

        function openModal(c) {
            document.getElementById('modal-title').innerText = c;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(c);
        }

        function renderSemanas(curso) {
            const body = document.getElementById('modal-body');
            let html = "";
            
            // Lógica de nombres según tu Drive:
            // Ejemplo: ALGEBRA 2024 1-40 -> DIAPOSITIVAS -> ASM-TS001-AL.pdf
            for(let i=1; i<=40; i++) {
                const num = i < 10 ? `0${i}` : i;
                const numTriple = i < 10 ? `00${i}` : `0${i}`;
                
                // IDs para Firebase
                const idT = `${curso}_S${i}_TEORIA`;
                const idP = `${curso}_S${i}_PRACTICA`;
                const idS = `${curso}_S${i}_SOLUCION`;

                const okT = DATA_CONTROL[idT] || false;
                const okP = DATA_CONTROL[idP] || false;
                const okS = DATA_CONTROL[idS] || false;

                // Base de la URL de GitHub (Ajustada a la estructura real de carpetas)
                const folderBase = `https://github.com/24135004/educativo/raw/main/${curso}%202024%201-40`;

                html += `
                <div class="week-item">
                    <div style="font-weight:800;">SEMANA ${num}</div>
                    <div class="resource-group">
                        <div style="text-align:center">
                            <a href="${folderBase}/DIAPOSITIVAS/ASM-TS${numTriple}-${curso.substring(0,2)}.pdf" target="_blank" class="btn-file ${!okT && !ES_MAMA ? 'locked' : ''}">TEORÍA</a>
                            ${ES_MAMA ? `<button onclick="toggle('${idT}')" class="btn-admin-control ${okT ? 'on' : 'off'}">${okT ? 'ON' : 'OFF'}</button>` : ''}
                        </div>

                        <div style="text-align:center">
                            <a href="${folderBase}/DIRIGIDAS/${curso.substring(0,2)}_ASM_Dir_Sem${num}.pdf" target="_blank" class="btn-file ${!okP && !ES_MAMA ? 'locked' : ''}">PRÁCTICA</a>
                            ${ES_MAMA ? `<button onclick="toggle('${idP}')" class="btn-admin-control ${okP ? 'on' : 'off'}">${okP ? 'ON' : 'OFF'}</button>` : ''}
                        </div>

                        <div style="text-align:center">
                            <a href="${folderBase}/RESOLUCION/RES_Sem${num}.pdf" target="_blank" class="btn-file ${!okS && !ES_MAMA ? 'locked' : ''}" style="color:var(--accent)">SOLUCIÓN</a>
                            ${ES_MAMA ? `<button onclick="toggle('${idS}')" class="btn-admin-control ${okS ? 'on' : 'off'}">${okS ? 'ON' : 'OFF'}</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }
            body.innerHTML = html;
        }

        function toggle(id) {
            const estado = !DATA_CONTROL[id];
            db.ref('permisos/' + id).set(estado);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal-title').innerText = "";
        }
    </script>
</body>
</html>
