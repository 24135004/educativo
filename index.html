<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --danger: #ff4757;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- VENTANA FIJA DE NOTIFICACIÓN --- */
        #notificacion-fija {
            width: 100%;
            padding: 1.2rem;
            text-align: center;
            font-weight: 700;
            position: sticky;
            top: 75px; /* Debajo del header */
            z-index: 99;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        .notif-mama { background: var(--danger); color: white; }
        .notif-alumno { background: var(--accent); color: white; }

        .btn-notif-accion {
            background: white;
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* --- RESTO DEL DISEÑO (SIN CAMBIOS) --- */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card-bg); backdrop-filter: blur(20px); padding: 3rem; border-radius: 2rem; width: 100%; max-width: 450px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .login-card h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 1.2rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; color: white; margin-top: 2rem; }
        .btn-primary { width: 100%; padding: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 1rem; font-weight: 700; margin-top: 1rem; cursor: pointer; }
        
        header { padding: 1.5rem 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .badge { background: var(--primary); padding: 0.5rem 1.2rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 800; }
        .container { max-width: 1300px; margin: 2rem auto; padding: 0 20px; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        .curso-card { background: var(--card-bg); padding: 2.5rem 1.5rem; border-radius: 1.5rem; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 1000px; height: 85vh; border-radius: 2.5rem; display: flex; flex-direction: column; }
        .modal-header { padding: 2rem; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-body { padding: 2rem; overflow-y: auto; flex-grow: 1; }
        .week-item { background: rgba(255,255,255,0.02); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .week-item.locked { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .file-link { padding: 0.8rem 1.5rem; border-radius: 0.8rem; text-decoration: none; font-size: 0.85rem; font-weight: 700; background: rgba(255,255,255,0.05); color: white; }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1>ACADEMY</h1>
            <input type="password" id="pass" placeholder="Código de acceso">
            <button class="btn-primary" onclick="initApp()">ACCEDER</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div class="nav-info">
                <div style="font-weight: 800; font-size: 1.4rem;">ACADEMY <span style="color:var(--primary)">.</span></div>
                <div id="role-badge" class="badge">CARGANDO...</div>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:700; cursor:pointer;">SALIR</button>
        </header>

        <div id="notificacion-fija" class="hidden"></div>

        <div class="container">
            <h2 class="section-title">Mis Cursos</h2>
            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            messagingSenderId: "762088181200",
            appId: "1:762088181200:web:f4b871149479649405bdd5",
            measurementId: "G-692NDCWKVK"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA"];
        let ES_MAMA = false;
        let DATA_CONTROL = {};

        // 1. ESCUCHAR NOTIFICACIONES FIJAS
        function escucharNotificaciones() {
            db.ref('notificaciones').on('value', (snap) => {
                const data = snap.val();
                const banner = document.getElementById('notificacion-fija');
                
                if (!data) { banner.classList.add('hidden'); return; }

                banner.classList.remove('hidden');

                if (ES_MAMA && data.tipo === "SOLICITUD_MAMÁ") {
                    banner.className = "notif-mama";
                    banner.innerHTML = `
                        <span>📢 TIENES QUE ACTIVAR UN CURSO: <b>${data.curso} - Semana ${data.semana}</b></span>
                        <button class="btn-notif-accion" onclick="abrirParaActivar('${data.curso}')">IR A DESBLOQUEAR</button>
                    `;
                } 
                else if (!ES_MAMA && data.tipo === "NUEVO_CURSO") {
                    banner.className = "notif-alumno";
                    banner.innerHTML = `
                        <span>🔥 ¡NUEVO CURSO DESBLOQUEADO! Tienes que resolver: <b>${data.curso} - Sem ${data.semana}</b></span>
                        <button class="btn-notif-accion" onclick="abrirParaResolver('${data.curso}')">EMPEZAR AHORA</button>
                    `;
                } else {
                    banner.classList.add('hidden');
                }
            });
        }

        async function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('role-badge').innerText = ES_MAMA ? "MAMÁ (ADMIN)" : "ALUMNO (ESTUDIANTE)";
                
                // Cargar datos y activar notificaciones
                db.ref('permisos').on('value', (snap) => {
                    DATA_CONTROL = snap.val() || {};
                    renderCursos();
                });
                
                escucharNotificaciones();
            } else { alert("Acceso denegado"); }
        }

        function renderCursos() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')">
                    <h3>${c}</h3>
                    <p style="font-size:0.7rem; color:var(--text-dim); margin-top:10px;">Ver semanas</p>
                </div>
            `).join('');
        }

        function openModal(nombreCurso) {
            document.getElementById('modal-title').innerText = nombreCurso;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(nombreCurso);
        }

        function renderSemanas(nombreCurso) {
            const body = document.getElementById('modal-body');
            let html = "";
            for(let i=1; i<=40; i++) {
                let idSem = `${nombreCurso}_S${i}`;
                let activo = DATA_CONTROL[idSem] || false;
                html += `
                    <div class="week-item ${!activo && !ES_MAMA ? 'locked' : ''}">
                        <div><b>SEMANA ${i}</b> - ${activo ? '✅ ABIERTO' : '🔒 BLOQUEADO'}</div>
                        <div>
                            <a href="#" class="file-link">VER MATERIAL</a>
                            ${ES_MAMA ? `<button onclick="toggleSemana('${nombreCurso}', ${i})" class="file-link" style="background:var(--primary)">${activo ? 'BLOQUEAR' : 'DESBLOQUEAR'}</button>` : ''}
                        </div>
                    </div>
                `;
            }
            body.innerHTML = html;
        }

        // Lógica de activación y cambio de notificaciones
        function toggleSemana(curso, semana) {
            const id = `${curso}_S${semana}`;
            const nuevoEstado = !DATA_CONTROL[id];
            db.ref('permisos/' + id).set(nuevoEstado);

            if (nuevoEstado) {
                // Si mamá desbloquea, le llega la notificación al HIJO
                db.ref('notificaciones').set({
                    tipo: "NUEVO_CURSO",
                    curso: curso,
                    semana: semana
                });
            } else {
                db.ref('notificaciones').remove();
            }
        }

        function abrirParaActivar(curso) { openModal(curso); }
        function abrirParaResolver(curso) { 
            db.ref('notificaciones').remove(); // El hijo quita la notif al entrar
            openModal(curso); 
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
