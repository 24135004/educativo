<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --danger: #ff4757;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* --- NOTIFICACIÓN FIJA (ESTILO GLASS) --- */
        #notif-fija-container {
            width: 100%;
            padding: 15px 5%;
            position: sticky;
            top: 85px;
            z-index: 99;
        }
        .notif-box {
            padding: 1.5rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .notif-mama { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; }
        .notif-alumno { background: linear-gradient(135deg, #6366f1, #4338ca); color: white; }
        .btn-notif { background: white; color: #000; border: none; padding: 10px 22px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }

        /* --- LOGIN --- */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card-bg); backdrop-filter: blur(20px); padding: 4rem; border-radius: 3rem; width: 100%; max-width: 480px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .login-card h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 1.4rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.2rem; color: white; margin: 2rem 0; font-size: 1.1rem; }
        .btn-primary { width: 100%; padding: 1.4rem; background: var(--primary); color: white; border: none; border-radius: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-3px); background: var(--primary-dark); }

        /* --- HEADER --- */
        header { padding: 1.5rem 6%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; }
        .badge { background: var(--primary); padding: 0.6rem 1.4rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 800; }

        /* --- GRID --- */
        .container { max-width: 1400px; margin: 4rem auto; padding: 0 30px; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2.5rem; }
        .curso-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); padding: 3.5rem 2rem; border-radius: 2.5rem; text-align: center; transition: 0.5s; cursor: pointer; }
        .curso-card:hover { transform: translateY(-15px); border-color: var(--primary); background: rgba(255,255,255,0.05); }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 25px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 1100px; height: 85vh; border-radius: 3rem; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { padding: 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 2.5rem; overflow-y: auto; flex-grow: 1; }
        .week-item { background: rgba(255,255,255,0.03); border-radius: 2rem; padding: 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.08); }
        .week-item.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .file-link { padding: 1rem 2rem; border-radius: 1.2rem; text-decoration: none; font-size: 0.9rem; font-weight: 800; background: rgba(255,255,255,0.1); color: white; border: none; cursor: pointer; transition: 0.3s; }
        .file-link:hover { background: var(--primary); }
        .btn-admin { border: 2px solid var(--accent); color: var(--accent); background: transparent; }
        .btn-admin:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1>ACADEMY</h1>
            <input type="password" id="pass" placeholder="Código de acceso">
            <button class="btn-primary" onclick="initApp()">INGRESAR</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div class="nav-info">
                <div style="font-weight: 900; font-size: 1.8rem;">ACADEMY<span style="color:var(--primary)">.</span></div>
                <div id="role-badge" class="badge">CARGANDO...</div>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:800; cursor:pointer;">SALIR</button>
        </header>

        <div id="notif-fija-container" class="hidden"></div>

        <div class="container">
            <h2 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 3rem;">Contenido 2026</h2>
            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="font-weight: 900; font-size: 2rem;"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:3rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            messagingSenderId: "762088181200",
            appId: "1:762088181200:web:f4b871149479649405bdd5",
            measurementId: "G-692NDCWKVK"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA"];
        let ES_MAMA = false;
        let DATA_CONTROL = {};

        // --- LÓGICA DE NOTIFICACIONES ---
        db.ref('notificaciones').on('value', (snap) => {
            const data = snap.val();
            const container = document.getElementById('notif-fija-container');
            if (!data) { container.classList.add('hidden'); return; }

            container.classList.remove('hidden');
            if (ES_MAMA && data.tipo === "SOLICITUD_MAMÁ") {
                container.innerHTML = `
                    <div class="notif-box notif-mama">
                        <span>📢 TIENES QUE ACTIVAR: ${data.curso} - Sem ${data.semana}</span>
                        <button class="btn-notif" onclick="openModal('${data.curso}')">IR AHORA</button>
                    </div>`;
            } else if (!ES_MAMA && data.tipo === "NUEVO_CURSO") {
                container.innerHTML = `
                    <div class="notif-box notif-alumno">
                        <span>🚀 ¡NUEVO CURSO! Tienes que resolver: ${data.curso} - Sem ${data.semana}</span>
                        <button class="btn-notif" onclick="resolverYLimpiar('${data.curso}')">EMPEZAR</button>
                    </div>`;
            } else { container.classList.add('hidden'); }
        });

        function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('role-badge').innerText = ES_MAMA ? "MODO PAPÁ" : "ESTUDIANTE";
                
                db.ref('permisos').on('value', (snap) => {
                    DATA_CONTROL = snap.val() || {};
                    renderCursos();
                });
            } else { alert("Acceso denegado"); }
        }

        function renderCursos() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')">
                    <h3>${c}</h3>
                    <p style="margin-top:10px;">VER SEMANAS</p>
                </div>`).join('');
        }

        function openModal(nombreCurso) {
            document.getElementById('modal-title').innerText = nombreCurso;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(nombreCurso);
        }

        function renderSemanas(nombreCurso) {
            const body = document.getElementById('modal-body');
            let html = "";
            for(let i=1; i<=40; i++) {
                let idSem = `${nombreCurso}_S${i}`;
                let activo = DATA_CONTROL[idSem] || false;
                html += `
                    <div class="week-item ${!activo && !ES_MAMA ? 'locked' : ''}">
                        <div><b>SEMANA ${i}</b> — ${activo ? '✅ ABIERTO' : '🔒 BLOQUEADO'}</div>
                        <div style="display:flex; gap:15px;">
                            <button class="file-link">VER MATERIAL</button>
                            ${ES_MAMA ? `<button onclick="toggleSemana('${nombreCurso}', ${i})" class="file-link btn-admin">${activo ? 'BLOQUEAR' : 'DESBLOQUEAR'}</button>` : ''}
                        </div>
                    </div>`;
            }
            body.innerHTML = html;
        }

        function toggleSemana(curso, sem) {
            const id = `${curso}_S${sem}`;
            const nuevoEstado = !DATA_CONTROL[id];
            
            // 1. Cambiar permiso
            db.ref('permisos/' + id).set(nuevoEstado);
            
            // 2. Si se desbloquea, enviar notificación al HIJO
            if (nuevoEstado) {
                db.ref('notificaciones').set({
                    tipo: "NUEVO_CURSO",
                    curso: curso,
                    semana: sem
                });
            } else {
                db.ref('notificaciones').remove();
            }
        }

        function resolverYLimpiar(curso) {
            db.ref('notificaciones').remove();
            openModal(curso);
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
