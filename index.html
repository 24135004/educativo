<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --danger: #ff4757;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* --- LOGIN DESIGN --- */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            padding: 4rem; 
            border-radius: 3rem; 
            width: 100%; 
            max-width: 480px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center; 
        }
        .login-card h1 { 
            font-size: 3rem; 
            font-weight: 800; 
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -1px;
        }
        .input-group { margin: 2.5rem 0; }
        input { 
            width: 100%; 
            padding: 1.4rem; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 1.2rem; 
            color: white; 
            font-size: 1.1rem; 
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
        .btn-primary { 
            width: 100%; 
            padding: 1.4rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 1.2rem; 
            font-weight: 800; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: 0.4s; 
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-3px); box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4); }

        /* --- DASHBOARD HEADER --- */
        header { 
            padding: 1.5rem 6%; 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(15px); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.08); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .badge { background: var(--primary); padding: 0.6rem 1.4rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 800; }

        /* --- COURSES GRID --- */
        .container { max-width: 1400px; margin: 4rem auto; padding: 0 30px; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; }
        .curso-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.08); 
            padding: 3.5rem 2rem; 
            border-radius: 2rem; 
            text-align: center; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .curso-card:hover { 
            transform: translateY(-15px) scale(1.02); 
            background: rgba(255,255,255,0.06); 
            border-color: var(--primary); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }
        .curso-card h3 { font-weight: 800; font-size: 1.3rem; margin-bottom: 10px; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 25px; }
        .modal-content { 
            background: #1e293b; 
            width: 100%; 
            max-width: 1100px; 
            height: 85vh; 
            border-radius: 3rem; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.12); 
        }
        .modal-header { padding: 2.5rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 2.5rem 3rem; overflow-y: auto; flex-grow: 1; }
        .week-item { 
            background: rgba(255,255,255,0.03); 
            border-radius: 2rem; 
            padding: 2rem; 
            margin-bottom: 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border: 1px solid rgba(255,255,255,0.06); 
        }
        .week-item.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .btn-action { 
            padding: 1rem 2rem; 
            border-radius: 1.2rem; 
            font-size: 0.9rem; 
            font-weight: 800; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-action:hover { background: var(--primary); }
        .btn-unlock { border: 2px solid var(--accent); color: var(--accent); background: transparent; }
        .btn-unlock:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <section id="view-login">
        <div class="login-card">
            <h1>ACADEMY</h1>
            <input type="password" id="pass" placeholder="Código de acceso">
            <button class="btn-primary" onclick="initApp()">INGRESAR</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header>
            <div style="font-weight: 900; font-size: 1.8rem;">ACADEMY<span style="color:var(--primary)">.</span></div>
            <div id="role-badge" class="badge">CONECTADO</div>
        </header>

        <div class="container">
            <h2 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 3rem;">Mis Cursos</h2>
            <div class="grid-cursos" id="main-grid"></div>
        </div>
    </section>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="font-weight: 900; font-size: 2rem;"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:3rem; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A",
            authDomain: "educativo-87abb.firebaseapp.com",
            databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com",
            projectId: "educativo-87abb",
            storageBucket: "educativo-87abb.firebasestorage.app",
            messagingSenderId: "762088181200",
            appId: "1:762088181200:web:f4b871149479649405bdd5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA"];
        let ES_MAMA = false;
        let DATA_CONTROL = {};

        function initApp() {
            const pass = document.getElementById('pass').value;
            if(pass === "MAMA2026" || pass === "ESTUDIANTE01") {
                ES_MAMA = (pass === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('role-badge').innerText = ES_MAMA ? "MODO PADRE" : "MODO ESTUDIANTE";
                
                db.ref('permisos').on('value', (snap) => {
                    DATA_CONTROL = snap.val() || {};
                    renderCursos();
                });
            } else { alert("Error de acceso"); }
        }

        function renderCursos() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = CURSOS.map(c => `
                <div class="curso-card" onclick="openModal('${c}')">
                    <h3>${c}</h3>
                    <p style="color:var(--text-dim); font-size:0.8rem; margin-top:10px;">2026</p>
                </div>`).join('');
        }

        function openModal(curso) {
            document.getElementById('modal-title').innerText = curso;
            document.getElementById('modal').classList.remove('hidden');
            renderSemanas(curso);
        }

        function renderSemanas(curso) {
            const body = document.getElementById('modal-body');
            let html = "";
            for(let i=1; i<=40; i++) {
                let idSem = `${curso}_S${i}`;
                let activo = DATA_CONTROL[idSem] || false;
                html += `
                    <div class="week-item ${!activo && !ES_MAMA ? 'locked' : ''}">
                        <div><b>SEMANA ${i}</b> — ${activo ? 'ACTIVO' : 'BLOQUEADO'}</div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-action">MATERIAL</button>
                            ${ES_MAMA ? `<button onclick="toggleSemana('${curso}', ${i})" class="btn-action btn-unlock">${activo ? 'CERRAR' : 'ABRIR'}</button>` : ''}
                        </div>
                    </div>`;
            }
            body.innerHTML = html;
        }

        function toggleSemana(curso, num) {
            const id = `${curso}_S${num}`;
            db.ref('permisos/' + id).set(!DATA_CONTROL[id]);
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
