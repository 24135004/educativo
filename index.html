<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet Educativa Familiar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 1000px; padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        /* Login */
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 100px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-principal { background: var(--primary); color: white; border: none; padding: 12px 40px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; }

        /* Panel de Contenido */
        .grid-modulos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .modulo { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; }
        .modulo h3 { border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: var(--dark); display: flex; align-items: center; gap: 10px; }

        /* Estilo de los Items (Materiales) */
        .item-material { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 15px; transition: 0.3s; }
        .item-material:hover { border-color: var(--primary); transform: scale(1.02); }
        .tag-curso { font-size: 0.7rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .mensaje-fijado { background: #fff3cd; color: #856404; padding: 8px; border-radius: 5px; font-size: 0.85rem; margin: 10px 0; border-left: 4px solid #ffeeba; }
        .btn-descarga { display: inline-block; background: var(--dark); color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 0.85rem; margin-top: 5px; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout { color: #ef4444; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="section-login" class="login-card">
            <h2 style="margin-top:0">🔐 Acceso Privado</h2>
            <p>Introduce tu código para ver el material</p>
            <input type="password" id="input-pass" placeholder="Tu código aquí...">
            <button class="btn-principal" onclick="validar()">Ingresar</button>
        </div>

        <div id="section-panel" class="hidden">
            <div class="header-panel">
                <h2 id="txt-bienvenida"></h2>
                <span class="logout" onclick="location.reload()">Cerrar Sesión</span>
            </div>

            <div class="grid-modulos">
                <div class="modulo">
                    <h3>📁 Diapositivas</h3>
                    <div id="lista-diapositivas">Cargando...</div>
                </div>

                <div class="modulo">
                    <h3>📝 Prácticas Dirigidas</h3>
                    <div id="lista-practicas">Cargando...</div>
                </div>

                <div id="modulo-mama" class="modulo hidden" style="border-top: 5px solid var(--secondary);">
                    <h3>✅ Resoluciones (Profesor)</h3>
                    <div id="lista-resoluciones">Cargando...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FUNCIÓN PARA RENDERIZAR LOS MATERIALES
        async function cargarDatos(archivo, contenedorId) {
            const contenedor = document.getElementById(contenedorId);
            try {
                const res = await fetch(archivo);
                const data = await res.json();
                
                if (data.length === 0) {
                    contenedor.innerHTML = "<p style='color:gray'>No hay material nuevo hoy.</p>";
                    return;
                }

                contenedor.innerHTML = "";
                // Mostramos de más nuevo a más viejo
                data.reverse().forEach(info => {
                    const html = `
                        <div class="item-material">
                            <span class="tag-curso">${info.curso}</span>
                            <div style="font-weight:600; margin: 5px 0;">${info.tema}</div>
                            <div class="mensaje-fijado">🚩 ${info.mensaje}</div>
                            <a href="${info.url}" target="_blank" class="btn-descarga">Ver Documento</a>
                        </div>
                    `;
                    contenedor.innerHTML += html;
                });
            } catch (err) {
                contenedor.innerHTML = "Error al cargar archivos.";
            }
        }

        function validar() {
            const pass = document.getElementById('input-pass').value;
            const codMama = "MAMA2026";
            const codHno = "ESTUDIANTE01";

            if (pass === codMama) {
                document.getElementById('section-login').classList.add('hidden');
                document.getElementById('section-panel').classList.remove('hidden');
                document.getElementById('modulo-mama').classList.remove('hidden');
                document.getElementById('txt-bienvenida').innerText = "Panel de Control - Mamá";
                
                // Carga todo
                cargarDatos('diapositivas.json', 'lista-diapositivas');
                cargarDatos('practicas.json', 'lista-practicas');
                cargarDatos('resoluciones.json', 'lista-resoluciones');
            } 
            else if (pass === codHno) {
                document.getElementById('section-login').classList.add('hidden');
                document.getElementById('section-panel').classList.remove('hidden');
                document.getElementById('txt-bienvenida').innerText = "Mis Materiales de Estudio";
                
                // Solo carga lo del alumno
                cargarDatos('diapositivas.json', 'lista-diapositivas');
                cargarDatos('practicas.json', 'lista-practicas');
            } 
            else {
                alert("Código incorrecto");
            }
        }
    </script>
</body>
</html>
