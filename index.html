<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ACADÉMICO | INTRANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #6366f1; --accent: #10b981; --danger: #ff4757; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        .hidden { display: none !important; }
        /* Banner Mamá */
        .admin-msg { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); padding: 15px; border-radius: 1rem; margin-bottom: 20px; color: var(--accent); font-weight: 600; text-align: center; }
        /* Toast Hermano */
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); padding: 15px; border-radius: 10px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        /* Estilos Base */
        #view-login { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 3rem; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; margin: 1rem 0; }
        .btn-primary { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        header { padding: 1rem 5%; background: rgba(15, 23, 42, 0.8); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .curso-card { background: var(--card-bg); padding: 2rem; border-radius: 1rem; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #1e293b; width: 90%; max-width: 800px; height: 80vh; border-radius: 2rem; display: flex; flex-direction: column; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .modal-body { padding: 1.5rem; overflow-y: auto; }
        .week-item { background: rgba(255,255,255,0.03); padding: 1rem; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .locked { opacity: 0.3; pointer-events: none; }
        .file-link { padding: 0.5rem 1rem; border-radius: 5px; text-decoration: none; background: rgba(255,255,255,0.1); color: white; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="toast" class="hidden"></div>
    <section id="view-login">
        <div class="login-card"><h1>ACADEMY</h1><input type="password" id="pass" placeholder="Código"><button class="btn-primary" onclick="initApp()">ENTRAR</button></div>
    </section>
    <section id="view-app" class="hidden">
        <header><div>ACADEMY <span id="role" style="font-size:0.8rem; background:var(--primary); padding:4px 10px; border-radius:10px;"></span></div><button onclick="location.reload()" style="color:var(--danger); background:none; border:none; cursor:pointer;">SALIR</button></header>
        <div class="container">
            <div id="mama-msg" class="admin-msg hidden">💡 Plan del día: Activa 1 curso para hoy. Si termina rápido, puedes activar el siguiente.</div>
            <div class="grid-cursos" id="grid"></div>
        </div>
    </section>
    <div id="modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><h2 id="m-title"></h2><button onclick="closeM()" style="color:white; background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button></div><div class="modal-body" id="m-body"></div></div></div>
    <script>
        const config = { databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com" }; // Simplificado para el ejemplo
        firebase.initializeApp({apiKey: "AIzaSyBP_HJJ1RYjZiyHkVfA-dAwde_pRzXtl-A", authDomain: "educativo-87abb.firebaseapp.com", databaseURL: "https://educativo-87abb-default-rtdb.firebaseio.com", projectId: "educativo-87abb", storageBucket: "educativo-87abb.firebasestorage.app", messagingSenderId: "762088181200", appId: "1:762088181200:web:f4b871149479649405bdd5"});
        const db = firebase.database();
        const CURSOS = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA", "SIMULACROS", "DOMICILIARIAS", "TEMARIO"];
        let ES_MAMA = false, DATA = {};

        db.ref('permisos').on('value', s => { DATA = s.val() || {}; if(document.getElementById('m-title').innerText) renderS(document.getElementById('m-title').innerText); });
        db.ref('notificaciones').on('value', s => { 
            const d = s.val(); if(!d || ES_MAMA) return;
            const t = document.getElementById('toast'); t.innerText = `NUEVO: ${d.curso} S${d.semana}`; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 5000);
        });

        function initApp() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                ES_MAMA = (p === "MAMA2026");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('role').innerText = ES_MAMA ? "ADMIN" : "ALUMNO";
                if(ES_MAMA) document.getElementById('mama-msg').classList.remove('hidden');
                document.getElementById('grid').innerHTML = CURSOS.map(c => `<div class="curso-card" onclick="openM('${c}')"><h3>${c}</h3></div>`).join('');
            }
        }
        function openM(c) { document.getElementById('m-title').innerText = c; document.getElementById('modal').classList.remove('hidden'); renderS(c); }
        function renderS(c) {
            let h = "";
            for(let i=1; i<=40; i++) {
                const id = `${c}_S${i}`, ok = DATA[id];
                h += `<div class="week-item ${!ok && !ES_MAMA ? 'locked' : ''}">
                    <span>S${i} ${ok?'✅':'🔒'}</span>
                    <div><a href="#" class="file-link">PDF</a>
                    ${ES_MAMA?`<button onclick="toggle('${id}')" class="file-link">${ok?'CERRAR':'ABRIR'}</button>`:''}</div>
                </div>`;
            }
            document.getElementById('m-body').innerHTML = h;
        }
        function toggle(id) {
            const estado = !DATA[id]; db.ref('permisos/'+id).set(estado);
            const p = id.split('_S'); db.ref('notificaciones').set({curso: p[0], semana: p[1], tipo: estado?"DESBLOQUEO":"BLOQUEO"});
        }
        function closeM() { document.getElementById('m-title').innerText = ""; document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
