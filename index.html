<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet Educativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #f43f5e; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .hidden { display: none !important; }
        
        /* Estilos Modernos */
        header { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px #0000000d; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        
        /* Login */
        .login-box { background: white; padding: 3rem; border-radius: 2rem; box-shadow: 0 25px 50px -12px #00000040; max-width: 400px; margin: 10vh auto; text-align: center; }
        input { width: 100%; padding: 1rem; margin: 1rem 0; border: 2px solid #f1f5f9; border-radius: 1rem; font-size: 1rem; box-sizing: border-box; }
        .btn-go { background: var(--p); color: white; border: none; padding: 1rem 2rem; border-radius: 1rem; width: 100%; font-weight: 800; cursor: pointer; }

        /* Cursos */
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 2rem 1rem; border-radius: 1.5rem; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; font-weight: 700; }
        .card:hover { transform: translateY(-5px); border-color: var(--p); box-shadow: 0 10px 15px -3px #4f46e526; }

        /* Semanas */
        .week-card { background: white; margin-bottom: 1rem; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 1rem; }
        .week-card.locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .week-header { display: flex; justify-content: space-between; align-items: center; }
        .status-tag { padding: 0.3rem 0.8rem; border-radius: 0.5rem; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .tag-open { background: #dcfce7; color: #166534; }
        .tag-close { background: #fee2e2; color: #991b1b; }

        .btn-group { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .btn-f { flex: 1; min-width: 120px; background: #f1f5f9; padding: 0.8rem; border-radius: 0.8rem; text-decoration: none; color: #475569; font-size: 0.8rem; text-align: center; font-weight: 600; border: 1px solid transparent; }
        .btn-f:hover { background: #e0e7ff; color: var(--p); border-color: var(--p); }
        
        .modal { position: fixed; inset: 0; background: #00000080; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
        .modal-content { background: var(--bg); width: 100%; max-width: 800px; height: 85vh; border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="view-login" class="login-box">
        <h1 style="color:var(--p); margin:0">Intranet</h1>
        <p style="color:#64748b">Acceso con código de familia</p>
        <input type="password" id="pass" placeholder="Tu contraseña aquí...">
        <button class="btn-go" onclick="acceder()">ENTRAR</button>
    </div>

    <div id="view-app" class="hidden">
        <header>
            <span id="badge" style="background:#e0e7ff; color:var(--p); padding:0.5rem 1rem; border-radius:1rem; font-weight:700"></span>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--d); font-weight:700; cursor:pointer">SALIR</button>
        </header>
        <div class="container">
            <h2 style="font-weight:800; font-size:1.8rem">Mis Cursos</h2>
            <div class="grid-cursos" id="grid"></div>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div style="padding:1.5rem 2rem; background:white; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e2e8f0">
                <h2 id="m-title" style="margin:0; font-weight:800"></h2>
                <button onclick="closeM()" style="border:none; background:none; font-size:2rem; cursor:pointer">&times;</button>
            </div>
            <div id="m-body" style="padding:2rem; overflow-y:auto"></div>
        </div>
    </div>

    <script>
        const cursos = ["ALGEBRA", "ARITMETICA", "BIOLOGIA", "ECONOMIA", "FILOSOFIA", "FISICA", "GEOGRAFIA", "GEOMETRIA", "HISTORIA", "LENGUAJE", "LITERATURA", "PSICOLOGIA", "QUIMICA", "RAZ. MATEMATICO", "RAZ. VERBAL", "TRIGONOMETRIA", "SIMULACROS", "DOMICILIARIAS", "TEMARIO"];
        let userMama = false;
        let unlockedGlobal = {};

        // 1. CARGAR DATOS DESDE GITHUB (Sincronización total)
        async function cargarPermisos() {
            try {
                // AQUÍ CAMBIARÁS EL ENLACE AL ARCHIVO JSON EN TU GITHUB CUANDO LO CREES
                const response = await fetch('https://raw.githubusercontent.com/24135004/educativo/main/control.json');
                if(response.ok) unlockedGlobal = await response.json();
            } catch (e) { console.log("Usando datos locales o vacío"); }
        }

        async function acceder() {
            const p = document.getElementById('pass').value;
            if(p === "MAMA2026" || p === "ESTUDIANTE01") {
                userMama = (p === "MAMA2026");
                await cargarPermisos(); // Sincroniza antes de entrar
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('badge').innerText = userMama ? "MODO MAMÁ" : "MODO ESTUDIANTE";
                renderCursos();
            } else { alert("Error"); }
        }

        function renderCursos() {
            const g = document.getElementById('grid');
            g.innerHTML = cursos.map(c => `<div class="card" onclick="openC('${c}')">${c}</div>`).join('');
        }

        function openC(c) {
            document.getElementById('m-title').innerText = c;
            document.getElementById('modal').classList.remove('hidden');
            const body = document.getElementById('m-body');
            body.innerHTML = "";

            for(let i=1; i<=40; i++) {
                let n = i < 10 ? "0"+i : i;
                let id = `${c}_S${i}`;
                let isOK = unlockedGlobal[id] || false;
                
                let base = `https://github.com/24135004/educativo/raw/main/${c}%202024%201-40`;
                let d = (c === "ALGEBRA" && i === 1) ? `${base}/DIAPOSITIVAS/ASM-TS001-AL.pdf` : "#";
                let p = (c === "ALGEBRA" && i === 1) ? `${base}/DIRIGIDAS/AL_ASM_Dir_Sem01.pdf` : "#";
                let r = (c === "ALGEBRA" && i === 1) ? `${base}/RESOLUCIONES/2024-03-08%2014-06-36.pdf` : "#";

                body.innerHTML += `
                    <div class="week-card ${!isOK && !userMama ? 'locked' : ''}">
                        <div class="week-header">
                            <span style="font-weight:800">SEMANA ${n}</span>
                            <span class="status-tag ${isOK ? 'tag-open' : 'tag-close'}">${isOK ? '🔓 Abierta' : '🔒 Bloqueada'}</span>
                        </div>
                        <div class="btn-group">
                            <a href="${d}" target="_blank" class="btn-f">📘 Teoría</a>
                            <a href="${p}" target="_blank" class="btn-f">📝 Práctica</a>
                            ${userMama ? `<a href="${r}" target="_blank" class="btn-f" style="color:var(--s)">✅ Solución</a>` : ''}
                        </div>
                        ${userMama ? `<p style="font-size:0.7rem; color:gray; margin:0">Para habilitar esta semana, edita control.json en GitHub y pon "${id}": true</p>` : ''}
                    </div>
                `;
            }
        }

        function closeM() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
